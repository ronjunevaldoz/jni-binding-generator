name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: jobs only read repo contents.
permissions:
  contents: read

jobs:
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check scripts/

      - name: Format check
        run: ruff format --check scripts/

      - name: clang-format check (jni-utils.h)
        run: |
          sudo apt-get install -y --no-install-recommends clang-format 2>/dev/null \
            || brew install clang-format 2>/dev/null || true
          clang-format --dry-run --Werror scripts/jni-utils.h

  test:
    name: Tests + generated-code compile (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run unit + integration tests
        # JAVA_HOME is exported by setup-java, so the integration test will
        # actually compile generated C++ against the JDK's jni.h.
        run: python3 -m unittest discover -s scripts/tests -v

  drift:
    name: Generated examples are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check sample-binding
        run: |
          python3 scripts/jni-binding-generator.py \
            --kotlin-source examples/sample-binding/SampleEngine.kt \
            --output examples/sample-binding/generated \
            --check --generate-tests

      - name: Check kmp-binding androidMain
        run: |
          python3 scripts/jni-binding-generator.py \
            --kotlin-source examples/kmp-binding/shared/src/androidMain/kotlin \
            --output examples/kmp-binding/androidApp/src/main/cpp/generated \
            --check

      - name: Check kmp-binding desktopMain
        run: |
          python3 scripts/jni-binding-generator.py \
            --kotlin-source examples/kmp-binding/shared/src/desktopMain/kotlin \
            --output examples/kmp-binding/desktopApp/src/jvmMain/cpp/generated \
            --check

      - name: Check android-binding Kotlin stubs (--kotlin-from-header)
        run: |
          python3 scripts/jni-binding-generator.py \
            --kotlin-from-header examples/android-binding/include/image_classifier.h \
            --output examples/android-binding/src \
            --kotlin-package com.example.android.classifier \
            --check

      - name: Check android-binding JNI stubs (forward pass)
        run: |
          python3 scripts/jni-binding-generator.py \
            --kotlin-source examples/android-binding/src/ImageClassifier.kt \
            --output examples/android-binding/generated \
            --check

      - name: Strict-types check (no unmapped TODO types in examples)
        run: |
          python3 scripts/jni-binding-generator.py \
            --kotlin-from-header examples/android-binding/include/image_classifier.h \
            --output examples/android-binding/src \
            --kotlin-package com.example.android.classifier \
            --strict-types --dry-run

      - name: Quality scorecard
        run: python3 scripts/jni-binding-generator.py --score
