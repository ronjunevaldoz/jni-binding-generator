# Pre-commit hooks for the JNI binding generator.
#
# Install once:   pip install pre-commit && pre-commit install
# Run manually:   pre-commit run --all-files
#
# These are local hooks (no network) so they work offline.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^scripts/.*\.py$
      - id: ruff-format
        files: ^scripts/.*\.py$

  - repo: local
    hooks:
      - id: jni-generator-tests
        name: jni-generator unit tests
        entry: python3 -m unittest discover -s scripts/tests
        language: system
        pass_filenames: false
        files: ^scripts/.*\.(py|h)$

      - id: jni-generator-drift-sample
        name: jni-generator sample-binding up to date
        entry: >
          python3 scripts/jni-binding-generator.py
          --kotlin-source examples/sample-binding/SampleEngine.kt
          --output examples/sample-binding/generated
          --check --generate-tests
        language: system
        pass_filenames: false
        files: >-
          ^(scripts/(jni-binding-generator|_driver|_generator|_ios|_kotlin_gen|_models|_parser|_types)\.py
          |examples/sample-binding/.*)$

      - id: jni-generator-drift-android-kt
        name: jni-generator android-binding Kotlin stubs up to date
        entry: >
          python3 scripts/jni-binding-generator.py
          --kotlin-from-header examples/android-binding/include/image_classifier.h
          --output examples/android-binding/src
          --kotlin-package com.example.android.classifier
          --check
        language: system
        pass_filenames: false
        files: >-
          ^(scripts/(jni-binding-generator|_driver|_kotlin_gen|_models)\.py
          |examples/android-binding/include/.*)$

      - id: jni-generator-drift-android
        name: jni-generator android-binding JNI stubs up to date
        entry: >
          python3 scripts/jni-binding-generator.py
          --kotlin-source examples/android-binding/src/ImageClassifier.kt
          --output examples/android-binding/generated
          --check
        language: system
        pass_filenames: false
        files: >-
          ^(scripts/(jni-binding-generator|_driver|_generator|_ios|_kotlin_gen|_models|_parser|_types)\.py
          |examples/android-binding/.*)$

      - id: jni-generator-drift-kmp-android
        name: jni-generator kmp-binding androidMain up to date
        entry: >
          python3 scripts/jni-binding-generator.py
          --kotlin-source examples/kmp-binding/shared/src/androidMain/kotlin
          --output examples/kmp-binding/androidApp/src/main/cpp/generated
          --check
        language: system
        pass_filenames: false
        files: >-
          ^(scripts/(jni-binding-generator|_driver|_generator|_ios|_kotlin_gen|_models|_parser|_types)\.py
          |examples/kmp-binding/.*)$

      - id: jni-generator-drift-kmp-desktop
        name: jni-generator kmp-binding desktopMain up to date
        entry: >
          python3 scripts/jni-binding-generator.py
          --kotlin-source examples/kmp-binding/shared/src/desktopMain/kotlin
          --output examples/kmp-binding/desktopApp/src/jvmMain/cpp/generated
          --check
        language: system
        pass_filenames: false
        files: >-
          ^(scripts/(jni-binding-generator|_driver|_generator|_ios|_kotlin_gen|_models|_parser|_types)\.py
          |examples/kmp-binding/.*)$
