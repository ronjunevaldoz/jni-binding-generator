target-version = "py310"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long — ruff-format handles wrapping
]

[lint.per-file-ignores]
# jni-binding-generator.py must patch sys.path before importing its own submodules,
# so imports after the sys.path block unavoidably trigger E402.
"scripts/jni-binding-generator.py" = ["E402"]
